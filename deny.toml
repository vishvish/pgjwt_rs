[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.93

[advisories]
ignore = [
  # Transitive via pgrx 0.17.0 — cannot fix without upstream update
  "RUSTSEC-2024-0436", # paste (unmaintained)
  "RUSTSEC-2021-0127", # serde_cbor (unmaintained)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
