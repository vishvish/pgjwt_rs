name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  checks: read
  actions: read

jobs:
  verify-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure CI and Security succeeded for tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          required_workflows=("ci.yml" "security.yml" "tests.yml")
          deadline=$((SECONDS + 1800))

          while true; do
            all_ready=true

            for workflow_file in "${required_workflows[@]}"; do
              run_json=$(gh run list \
                --repo "$REPO" \
                --workflow "$workflow_file" \
                --commit "$SHA" \
                --json status,conclusion \
                --limit 1)
              status=$(echo "$run_json" | jq -r '.[0].status // "missing"')
              conclusion=$(echo "$run_json" | jq -r '.[0].conclusion // "missing"')

              if [ "$status" = "missing" ]; then
                echo "Workflow '$workflow_file' not found for tagged commit yet."
                all_ready=false
                continue
              fi

              if [ "$status" != "completed" ]; then
                echo "Workflow '$workflow_file' status: $status"
                all_ready=false
                continue
              fi

              if [ "$conclusion" != "success" ]; then
                echo "Workflow '$workflow_file' concluded with '$conclusion'. Refusing publish."
                exit 1
              fi

              echo "Workflow '$workflow_file' passed."
            done

            if [ "$all_ready" = true ]; then
              break
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for required checks."
              exit 1
            fi

            sleep 15
          done

  verify:
    runs-on: ubuntu-latest
    needs: verify-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish dry-run
        run: cargo publish --dry-run --locked --no-default-features --features pg18

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --no-default-features --features pg18
