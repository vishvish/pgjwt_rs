name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            pg_version: 16
            pg_install: |
              sudo apt-get update
              sudo apt-get install -y postgresql-16 postgresql-server-dev-16
            pg_config_path: /usr/lib/postgresql/16/bin/pg_config
            cross: false
          # Linux x86_64 (Postgres 18)
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            pg_version: 18
            pg_install: |
              sudo apt-get update
              sudo apt-get install -y postgresql-18 postgresql-server-dev-18
            pg_config_path: /usr/lib/postgresql/18/bin/pg_config
            cross: false
          # Linux arm64 (Raspberry Pi 64-bit)
          - os: ubuntu-latest
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            pg_version: 16
            pg_install: |
              sudo apt-get update
              sudo apt-get install -y qemu-user-static binfmt-support
              sudo apt-get install -y postgresql-16 postgresql-server-dev-16
            pg_config_path: /usr/lib/postgresql/16/bin/pg_config
            cross: true
          # Linux arm64 (Postgres 18)
          - os: ubuntu-latest
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            pg_version: 18
            pg_install: |
              sudo apt-get update
              sudo apt-get install -y qemu-user-static binfmt-support
              sudo apt-get install -y postgresql-18 postgresql-server-dev-18
            pg_config_path: /usr/lib/postgresql/18/bin/pg_config
            cross: true
          # Linux armv7 (Raspberry Pi 32-bit)
          - os: ubuntu-latest
            platform: linux-armv7
            target: armv7-unknown-linux-gnueabihf
            pg_version: 16
            pg_install: |
              sudo apt-get update
              sudo apt-get install -y qemu-user-static binfmt-support
              sudo apt-get install -y postgresql-16 postgresql-server-dev-16
            pg_config_path: /usr/lib/postgresql/16/bin/pg_config
            cross: true
          # Linux armv7 (Postgres 18)
          - os: ubuntu-latest
            platform: linux-armv7
            target: armv7-unknown-linux-gnueabihf
            pg_version: 18
            pg_install: |
              sudo apt-get update
              sudo apt-get install -y qemu-user-static binfmt-support
              sudo apt-get install -y postgresql-18 postgresql-server-dev-18
            pg_config_path: /usr/lib/postgresql/18/bin/pg_config
            cross: true
          # macOS arm64
          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
            pg_version: 16
            pg_install: |
              brew install postgresql@16
            pg_config_path: /opt/homebrew/opt/postgresql@16/bin/pg_config
            cross: false
          # macOS arm64 (Postgres 18)
          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
            pg_version: 18
            pg_install: |
              brew install postgresql@18
            pg_config_path: /opt/homebrew/opt/postgresql@18/bin/pg_config
            cross: false
          # macOS x86_64
          - os: macos-latest
            platform: macos-x86_64
            target: x86_64-apple-darwin
            pg_version: 16
            pg_install: |
              arch -x86_64 /usr/local/bin/brew install postgresql@16 || true
            pg_config_path: /usr/local/opt/postgresql@16/bin/pg_config
            cross: false
          # macOS x86_64 (Postgres 18)
          - os: macos-latest
            platform: macos-x86_64
            target: x86_64-apple-darwin
            pg_version: 18
            pg_install: |
              arch -x86_64 /usr/local/bin/brew install postgresql@18 || true
            pg_config_path: /usr/local/opt/postgresql@18/bin/pg_config
            cross: false
          # Windows x86_64
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            pg_version: 16
            pg_install: |
              choco install postgresql --version=16.0
            pg_config_path: C:/Program Files/PostgreSQL/16/bin/pg_config.exe
            cross: false
          # Windows x86_64 (Postgres 18)
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            pg_version: 18
            pg_install: |
              choco install postgresql --version=18.0
            pg_config_path: C:/Program Files/PostgreSQL/18/bin/pg_config.exe
            cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print build environment info
        env:
          TARGET: ${{ matrix.target }}
          PG_CONFIG_PATH: ${{ matrix.pg_config_path }}
        run: |
          echo "uname -m: $(uname -m)"
          echo "Rust target: $TARGET"
          echo "pg_config: $PG_CONFIG_PATH"
          if [ -x "$PG_CONFIG_PATH" ]; then
            "$PG_CONFIG_PATH" --version
            "$PG_CONFIG_PATH" --libdir
          fi
        shell: bash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install PostgreSQL dev headers
        env:
          PLATFORM: ${{ matrix.platform }}
          CROSS: ${{ matrix.cross }}
          PG_VERSION: ${{ matrix.pg_version }}
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Postgres version: $PG_VERSION"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "macOS detected. Platform: $PLATFORM"
            BREW=""
            if [ -x "/opt/homebrew/bin/brew" ]; then BREW=/opt/homebrew/bin/brew; fi
            if [ -z "$BREW" ] && [ -x "/usr/local/bin/brew" ]; then BREW=/usr/local/bin/brew; fi
            if [ -z "$BREW" ]; then BREW=$(command -v brew || true); fi
            echo "Using brew: $BREW"
            if [ -z "$BREW" ]; then
              echo "Homebrew not found. Please ensure Homebrew is available on macOS runner."
              exit 1
            fi
            if [[ "$PLATFORM" == "macos-x86_64" ]]; then
              echo "Installing postgresql@$PG_VERSION via x86_64 Homebrew"
              arch -x86_64 "$BREW" install postgresql@$PG_VERSION || true
            else
              echo "Installing postgresql@$PG_VERSION via native Homebrew"
              "$BREW" install postgresql@$PG_VERSION || true
            fi
            echo "brew --prefix postgresql@$PG_VERSION: $($BREW --prefix postgresql@$PG_VERSION 2>/dev/null || true)"
            echo "brew list postgresql@$PG_VERSION (if installed):"
            "$BREW" list postgresql@$PG_VERSION || true
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "Linux detected. Installing via apt"
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg lsb-release
            curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
              | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" \
              | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
            sudo apt-get update
            if [[ "$CROSS" == 'true' ]]; then
              sudo apt-get install -y qemu-user-static binfmt-support || true
            fi
            sudo apt-get install -y postgresql-$PG_VERSION postgresql-server-dev-$PG_VERSION || true
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "Windows detected. Installing via Chocolatey"
            pwsh -Command "choco install postgresql --version=$PG_VERSION.0 -y" || true
          else
            echo "Unsupported runner OS: $RUNNER_OS"
            exit 1
          fi
        shell: bash

      - id: find_pg_unix
        name: Check pg_config and Postgres libs (Unix)
        if: runner.os != 'Windows'
        env:
          PG_CONFIG_PATH: ${{ matrix.pg_config_path }}
          PG_VERSION: ${{ matrix.pg_version }}
        run: |
          echo "Initial PG_CONFIG_PATH=$PG_CONFIG_PATH"
          echo "Postgres version: $PG_VERSION"
          echo "uname -m: $(uname -m)"
          echo "which brew: $(command -v brew || true)"
          candidates=(
            "$PG_CONFIG_PATH"
            "$(command -v pg_config 2>/dev/null || true)"
            "/opt/homebrew/opt/postgresql@${PG_VERSION}/bin/pg_config"
            "/usr/local/opt/postgresql@${PG_VERSION}/bin/pg_config"
            "/opt/homebrew/opt/postgresql/bin/pg_config"
            "/usr/local/opt/postgresql/bin/pg_config"
            "/usr/local/bin/pg_config"
            "/usr/bin/pg_config"
          )
          found=""
          for p in "${candidates[@]}"; do
            if [ -n "$p" ] && [ -x "$p" ]; then
              found="$p"
              break
            fi
          done

          # If not found, try Homebrew --prefix lookups for postgresql@$PG_VERSION and postgresql
          if [ -z "$found" ]; then
            for brew_cmd in "/opt/homebrew/bin/brew" "/usr/local/bin/brew" "$(command -v brew 2>/dev/null || true)"; do
              if [ -x "$brew_cmd" ]; then
                echo "Trying brew at: $brew_cmd"
                for formula in "postgresql@$PG_VERSION" "postgresql"; do
                  prefix=$($brew_cmd --prefix "$formula" 2>/dev/null || true)
                  if [ -n "$prefix" ]; then
                    candidate="$prefix/bin/pg_config"
                    echo "brew prefix candidate ($formula): $candidate"
                    if [ -x "$candidate" ]; then
                      found="$candidate"
                      break 2
                    fi
                  fi
                done
              fi
            done
          fi

          if [ -z "$found" ]; then
            echo "pg_config not found in candidates: ${candidates[*]}"
            echo "Searching common Homebrew prefixes for pg_config..."
            found=$(find /opt/homebrew /usr/local -path '*/bin/pg_config' -type f -executable 2>/dev/null | head -n 1 || true)
          fi

          if [ -z "$found" ]; then
            echo "pg_config still not found after fallback search"
            exit 1
          fi

          echo "Found pg_config: $found"
          echo "pg_config_path=$found" >> $GITHUB_OUTPUT
          "$found" --version || true
          LIBDIR=$("$found" --libdir)
          echo "pg libdir: $LIBDIR"
          ls -la "$LIBDIR" || true
          echo "file output for libs:"
          file "$LIBDIR"/* || true
          echo "Architecture of pg_config binary:"
          file "$found" || true
        shell: bash

      - id: find_pg_win
        name: Check pg_config and Postgres libs (Windows)
        if: runner.os == 'Windows'
        env:
          PG_CONFIG_PATH: ${{ matrix.pg_config_path }}
        shell: pwsh
        run: |
          Write-Host "Initial PG_CONFIG_PATH=$env:PG_CONFIG_PATH"
          $candidates = @(
            $env:PG_CONFIG_PATH,
            (Get-Command pg_config -ErrorAction SilentlyContinue).Source,
            'C:/Program Files/PostgreSQL/16/bin/pg_config.exe'
          )
          $found = $null
          foreach ($p in $candidates) {
            if ($p -and (Test-Path $p)) { $found = $p; break }
          }
          if (-not $found) {
            Write-Error "pg_config not found in candidates"
            exit 1
          }
          Write-Host "Found pg_config: $found"
          $libdir = & $found --libdir
          Write-Host "pg libdir: $libdir"
          Get-ChildItem -Path $libdir -File | ForEach-Object { Write-Host $_.FullName }
          Write-Output "pg_config_path=$found" >> $env:GITHUB_OUTPUT

      - name: Set detected pg_config (Unix)
        id: set_pg_unix
        if: runner.os != 'Windows'
        env:
          FROM_FIND: ${{ steps.find_pg_unix.outputs.pg_config_path }}
          FALLBACK: ${{ matrix.pg_config_path }}
        run: |
          CHOSEN="${FROM_FIND:-${FALLBACK}}"
          echo "Chosen pg_config: $CHOSEN"
          echo "pg_config_path=$CHOSEN" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set detected pg_config (Windows)
        id: set_pg_win
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          FROM_FIND: ${{ steps.find_pg_win.outputs.pg_config_path }}
          FALLBACK: ${{ matrix.pg_config_path }}
        run: |
          $chosen = if ($env:FROM_FIND) { $env:FROM_FIND } else { $env:FALLBACK }
          Write-Host "Chosen pg_config: $chosen"
          Write-Output "pg_config_path=$chosen" >> $env:GITHUB_OUTPUT

      - name: Install cargo-pgrx and init
        env:
          PG_VERSION: ${{ matrix.pg_version }}
          PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
        run: |
          cargo install --locked cargo-pgrx --version 0.17.0
          cargo pgrx init --pg${PG_VERSION} "$PG_CONFIG_PATH"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Generate test keys (RSA + Ed25519)
        run: |
          openssl version
          # RSA keys for RS256 tests
          openssl genrsa -out test_private.pem 2048
          openssl rsa -in test_private.pem -pubout -out test_public.pem
          # Ed25519 keys for EdDSA tests
          openssl genpkey -algorithm ed25519 -out test_ed25519_private.pem
          openssl pkey -in test_ed25519_private.pem -pubout -out test_ed25519_public.pem


      - name: Run unit tests
        if: ${{ github.event_name == 'workflow_dispatch' && !matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
          PG_VERSION: ${{ matrix.pg_version }}
          PG_CONFIG: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PGX_PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
        run: cargo test --no-default-features --features pg${PG_VERSION} --verbose --target $TARGET

      - name: Run unit tests (cross)
        if: ${{ github.event_name == 'workflow_dispatch' && matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
          PG_VERSION: ${{ matrix.pg_version }}
          PG_CONFIG: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PGX_PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross test --no-default-features --features pg${PG_VERSION} --target $TARGET --verbose


      - name: Build release library
        if: ${{ !matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
          PG_VERSION: ${{ matrix.pg_version }}
          PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PG_CONFIG: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PGX_PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
        run: |
          # Set library path for macOS linker
          if [[ "$OSTYPE" == "darwin"* ]]; then
            PG_LIB_DIR=$("$PG_CONFIG_PATH" --libdir)
            export DYLD_FALLBACK_LIBRARY_PATH="${PG_LIB_DIR}:${DYLD_FALLBACK_LIBRARY_PATH}"
          fi
          cargo build --release --features pg${PG_VERSION} --no-default-features --target $TARGET

      - name: Build release library (cross)
        if: ${{ matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
          PG_VERSION: ${{ matrix.pg_version }}
          PG_CONFIG: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PGX_PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --features pg${PG_VERSION} --no-default-features --target $TARGET


      - name: Package extension files
        env:
          PG_VERSION: ${{ matrix.pg_version }}
          PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PG_CONFIG: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
          PGX_PG_CONFIG_PATH: ${{ (steps.set_pg_unix.outputs.pg_config_path != '' && steps.set_pg_unix.outputs.pg_config_path) || (steps.set_pg_win.outputs.pg_config_path != '' && steps.set_pg_win.outputs.pg_config_path) || matrix.pg_config_path }}
        run: |
          # Set library path for macOS linker
          if [[ "$OSTYPE" == "darwin"* ]]; then
            PG_LIB_DIR=$("$PG_CONFIG_PATH" --libdir)
            export DYLD_FALLBACK_LIBRARY_PATH="${PG_LIB_DIR}:${DYLD_FALLBACK_LIBRARY_PATH}"
          fi
          chmod +x package.sh
          PG_FEATURE=pg${PG_VERSION} ./package.sh


      - name: Create tarball
        id: pack
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          PG_VERSION: ${{ matrix.pg_version }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="pgjwt_rs-${VERSION}-pg${PG_VERSION}-${PLATFORM}.tar.gz"
          tar -czf "$TARBALL" -C pkg .
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.tarball }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
