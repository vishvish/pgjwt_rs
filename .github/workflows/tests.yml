name: pgjwt_rs CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: pgjwt_rs-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-guard:
    name: Docker test guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests in Docker
        run: |
          chmod +x ./docker-test.sh
          ./docker-test.sh

  test:
    name: Unit tests (Rust)
    runs-on: ubuntu-latest
    needs: docker-guard
    env:
      PGRX_HOME: ${{ github.workspace }}/.pgrx
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure PostgreSQL APT repository (pg18)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null

      - name: Install PostgreSQL dev headers (pg18)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-18 postgresql-server-dev-18

      - name: Install cargo-pgrx (0.17.0) and init
        run: |
          cargo install --locked cargo-pgrx --version 0.17.0
          cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Generate test keys (RSA + Ed25519)
        run: |
          openssl version
          # RSA keys for RS256 tests (PKCS#8 format for ring)
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out test_private.pem
          openssl pkey -in test_private.pem -pubout -out test_public.pem
          # Ed25519 keys for EdDSA tests
          openssl genpkey -algorithm ed25519 -out test_ed25519_private.pem
          openssl pkey -in test_ed25519_private.pem -pubout -out test_ed25519_public.pem

      - name: Run tests (pg18)
        run: cargo test --no-default-features --features pg18 --verbose

