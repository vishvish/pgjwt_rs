name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: pgjwt_rs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PGRX_HOME: ${{ github.workspace }}/.pgrx

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests in Docker
        run: |
          chmod +x ./docker-test.sh
          ./docker-test.sh
